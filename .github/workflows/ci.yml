name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,gpu,plots]"
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -m "not realdata" --cov=mlxde --cov-report=term-missing

  real-data:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: .cache/scanpy
          key: pbmc3k-v1
      - run: pip install -e ".[dev,gpu,plots,validate]"
      # scanpy's calls are the reference for direction and ranking; see
      # tests/test_scanpy_reference.py for what is and is not asserted.
      - run: pytest -m realdata
